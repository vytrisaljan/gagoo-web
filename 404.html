<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stránka nenalezena — Blackwood Manor Affairs</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --velvet-black: #0a0a0a;
    --near-black: #111111;
    --ivory: #f0e8d8;
    --ivory-muted: #c8b99a;
    --ivory-dim: #6b5e4e;
    --crimson: #8b1a1a;
    --crimson-light: #b84444;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--velvet-black);
    color: var(--ivory);
    font-family: 'Montserrat', sans-serif;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 24px;
    text-align: center;
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(139,26,26,0.06) 0%, transparent 60%);
  }

  .brand {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--ivory-dim);
    margin-bottom: 60px;
    text-decoration: none;
    transition: color 0.3s ease;
  }
  .brand:hover { color: var(--ivory-muted); }

  .code {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(80px, 18vw, 160px);
    font-weight: 300;
    line-height: 1;
    color: var(--crimson);
    opacity: 0.35;
    letter-spacing: -4px;
    margin-bottom: 24px;
  }

  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 300;
    font-style: italic;
    color: var(--ivory);
    margin-bottom: 16px;
    line-height: 1.3;
  }

  .sub {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 2px;
    color: var(--ivory-dim);
    text-transform: uppercase;
    margin-bottom: 56px;
    line-height: 1.8;
  }

  .back-link {
    display: inline-block;
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--ivory-muted);
    text-decoration: none;
    border-bottom: 1px solid rgba(200,185,154,0.3);
    padding-bottom: 2px;
    transition: color 0.3s ease, border-color 0.3s ease;
  }
  .back-link:hover { color: var(--ivory); border-color: var(--ivory); }

  .divider {
    width: 40px;
    height: 1px;
    background: var(--ivory-dim);
    opacity: 0.3;
    margin: 0 auto 56px;
  }
</style>
</head>
<body>

  <a href="/" class="brand">G∆GOO · Blackwood Manor Affairs</a>

  <div class="code">404</div>

  <p class="headline">Tato stránka neexistuje.</p>

  <div class="divider"></div>

  <p class="sub">
    Možná byla přesunuta, nebo nikdy neexistovala.<br>
    Někdy je nejlepší stopou ta, která vede zpět.
  </p>

  <a href="/" class="back-link">← Zpět na hlavní stránku</a>

</body>
</html>
